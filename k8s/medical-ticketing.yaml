# ── Deployment ────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medical-ticketing
  namespace: default
spec:
  replicas: 2                        # Run 2 copies of the server
  selector:
    matchLabels:
      app: medical-ticketing
  template:
    metadata:
      labels:
        app: medical-ticketing       # Every Pod gets this label
    spec:
      containers:
        - name: ticketing-server
          image: medical-ticketing:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080

---
# ── Service ───────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: medical-ticketing-svc
  namespace: default
spec:
  type: NodePort
  selector:
    app: medical-ticketing           # Routes traffic to pods with this label
  ports:
    - port: 8080                     # Port on the Service
      targetPort: 8080               # Port on the Pod
      nodePort: 30080                # Port on your laptop to hit from outside