name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compile Java source
        run: javac *.java
        working-directory: .

      - name: Build Docker image
        run: docker build -t medical-ticketing:ci .

      - name: Smoke test — container starts cleanly
        run: |
          docker run -d --name test-server -p 8080:8080 medical-ticketing:ci
          sleep 5
          docker logs test-server
          docker logs test-server | grep -q "Server is running" && echo "PASS: Server started" || (echo "FAIL: Server did not start" && exit 1)
          docker stop test-server
          docker rm test-server